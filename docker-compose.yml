services:
  reactive-graph:
    build:
      context: .
    ports:
      - "${GRAPH_PORT_HOST:-8000}:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://host.docker.internal:${GRAPH_PORT_HOST:-8000}/healthcheck')",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      rg-neo4j:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-dummy}
      - OPENAI_BASE_URL=http://host.docker.internal:4000/v1
      - MODEL_NAME=tier1-graphiti-kg
      - EMBEDDING_MODEL_NAME=tier1-embeddings
      - NEO4J_URI=bolt://rg-neo4j:${NEO4J_PORT:-7687}
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-password}
      - PORT=8000
      - db_backend=neo4j

  rg-neo4j:
    image: neo4j:5.26.2
    hostname: rg-neo4j
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:${NEO4J_HTTP_PORT_HOST:-7474} || exit 1",
        ]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 30s
    ports:
      - "${NEO4J_HTTP_PORT_HOST:-7474}:7474" # HTTP
      - "${NEO4J_BOLT_PORT_HOST:-7687}:7687" # Bolt
    volumes:
      - neo4j_data:/data
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-}/${NEO4J_PASSWORD:-}

  rg-falkordb:
    image: falkordb/falkordb:latest
    profiles: ["falkordb"]
    ports:
      - "${FALKORDB_PORT:-6379}:6379"
    volumes:
      - reactive-graph_falkordb_data:/data
    environment:
      - FALKORDB_ARGS=--port 6379 --cluster-enabled no
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "ping"]
      interval: 1s
      timeout: 10s
      retries: 10
      start_period: 3s

  rg-graph-falkordb:
    build:
      args:
        INSTALL_FALKORDB: "true"
      context: .
    profiles: ["falkordb"]
    ports:
      - "${GRAPH_PORT_HOST:-8000}:8000"
    depends_on:
      rg-falkordb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://host.docker.internal:${GRAPH_PORT_HOST:-8000}/healthcheck')"]
      interval: 10s
      timeout: 5s
      retries: 3
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - FALKORDB_HOST=rg-falkordb
      - FALKORDB_PORT=${FALKORDB_PORT:-6379}
      - FALKORDB_DATABASE=default_db
      - GRAPHITI_BACKEND=falkordb
      - PORT=8000
      - db_backend=falkordb

volumes:
  neo4j_data:
  reactive-graph_falkordb_data:
